# World Engine Actions — mapped to goals by goalId
# Tier 0 = deterministic/free, Tier 1 = A* planned, Tier 2 = Ava LLM
#
# Every action that reads a domain must guard on extensions.{domain}_available.
# The engine sets this flag on each successful/failed tick.

actions:
  - id: alert.efficiency_low
    goalId: flow.efficiency_healthy
    tier: tier_0
    priority: 10
    cost: 0
    name: "Alert on low flow efficiency"
    preconditions:
      - path: "extensions.flow_available"
        operator: eq
        value: true
      - path: "domains.flow.data.efficiency.ratio"
        operator: lt
        value: 0.35
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.distribution_drift
    goalId: flow.distribution_balanced
    tier: tier_0
    priority: 10
    cost: 0
    name: "Alert on work distribution drift"
    preconditions:
      - path: "extensions.flow_available"
        operator: eq
        value: true
      - path: "domains.flow.data.distribution.ratios.feature"
        operator: lt
        value: 0.40
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.security_incident
    goalId: security.no_open_incidents
    tier: tier_0
    priority: 100
    cost: 0
    name: "Alert on open security incidents"
    preconditions:
      - path: "extensions.security_available"
        operator: eq
        value: true
      - path: "domains.security.data.openCount"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: ceremony.security_triage
    goalId: security.no_open_incidents
    tier: tier_0
    priority: 90
    cost: 1
    name: "Trigger security triage ceremony"
    preconditions:
      - path: "extensions.security_available"
        operator: eq
        value: true
      - path: "domains.security.data.criticalCount"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "ceremony.security-triage.execute"
      fireAndForget: true

  - id: alert.discord_disconnected
    goalId: services.discord_connected
    tier: tier_0
    priority: 50
    cost: 0
    name: "Alert when Discord bot disconnects"
    preconditions:
      - path: "extensions.services_available"
        operator: eq
        value: true
      - path: "domains.services.data.discord.connected"
        operator: eq
        value: false
      - path: "domains.services.data.discord.configured"
        operator: eq
        value: true
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.no_agents
    goalId: agents.registered
    tier: tier_0
    priority: 10
    cost: 0
    name: "Alert when no agents are registered"
    preconditions:
      - path: "extensions.agent_health_available"
        operator: eq
        value: true
      - path: "domains.agent_health.data.agentCount"
        operator: lt
        value: 1
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  # ── Service + Agent Ceremonies ─────────────────────────────────────

  - id: ceremony.service_health_discord
    goalId: services.discord_connected
    tier: tier_0
    priority: 80
    cost: 1
    name: "Trigger service health ceremony for Discord disconnect"
    preconditions:
      - path: "extensions.services_available"
        operator: eq
        value: true
      - path: "domains.services.data.discord.configured"
        operator: eq
        value: true
      - path: "domains.services.data.discord.connected"
        operator: eq
        value: false
    effects: []
    meta:
      topic: "ceremony.service-health.execute"
      fireAndForget: true

  # ── CI + PR Pipeline ─────────────────────────────────────────────

  - id: alert.ci_failures
    goalId: ci.success_rate_healthy
    tier: tier_0
    priority: 30
    cost: 0
    name: "Alert on CI failure rate"
    preconditions:
      - path: "extensions.ci_available"
        operator: eq
        value: true
      - path: "domains.ci.data.successRate"
        operator: lt
        value: 0.70
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.pr_conflicts
    goalId: pr.no_conflicts
    tier: tier_0
    priority: 20
    cost: 0
    name: "Alert on PRs with merge conflicts"
    preconditions:
      - path: "extensions.pr_pipeline_available"
        operator: eq
        value: true
      - path: "domains.pr_pipeline.data.conflicting"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.pr_stale
    goalId: pr.no_stale
    tier: tier_0
    priority: 10
    cost: 0
    name: "Alert on stale PRs"
    preconditions:
      - path: "extensions.pr_pipeline_available"
        operator: eq
        value: true
      - path: "domains.pr_pipeline.data.stale"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  # ── PR Remediation — closes the loop via PrRemediatorPlugin ───────────────

  - id: action.pr_merge_ready
    goalId: pr.mergeable_flushed
    tier: tier_0
    priority: 40
    cost: 1
    name: "Auto-merge ready PRs (dependabot / promote:) or escalate to HITL"
    preconditions:
      - path: "extensions.pr_pipeline_available"
        operator: eq
        value: true
      - path: "domains.pr_pipeline.data.readyToMerge"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "pr.remediate.merge_ready"
      fireAndForget: true

  - id: action.pr_fix_ci
    goalId: pr.no_failing_checks
    tier: tier_0
    priority: 35
    cost: 1
    name: "Dispatch Ava to investigate and remediate PRs with failing CI"
    preconditions:
      - path: "extensions.pr_pipeline_available"
        operator: eq
        value: true
      - path: "domains.pr_pipeline.data.failingCi"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "pr.remediate.fix_ci"
      fireAndForget: true

  - id: action.pr_address_feedback
    goalId: pr.no_changes_requested
    tier: tier_0
    priority: 30
    cost: 1
    name: "Dispatch Ava to address PR review feedback"
    preconditions:
      - path: "extensions.pr_pipeline_available"
        operator: eq
        value: true
      - path: "domains.pr_pipeline.data.changesRequested"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "pr.remediate.address_feedback"
      fireAndForget: true

  - id: alert.branch_drift
    goalId: branch.drift_low
    tier: tier_0
    priority: 15
    cost: 0
    name: "Alert when branch drift exceeds 30 commits"
    preconditions:
      - path: "extensions.branch_drift_available"
        operator: eq
        value: true
      - path: "domains.branch_drift.data.maxDrift"
        operator: gt
        value: 30
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  # ── Ava / protoMaker Studio ───────────────────────────────────────

  - id: alert.ava_board_blocked
    goalId: ava.board_healthy
    tier: tier_0
    priority: 10
    cost: 0
    name: "Alert on excessive blocked features"
    preconditions:
      - path: "extensions.ava_board_available"
        operator: eq
        value: true
      - path: "domains.ava_board.data.blocked_count"
        operator: gt
        value: 3
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: action.ava_triage_blocked
    goalId: ava.board_healthy
    tier: tier_0
    priority: 20
    cost: 1
    name: "Dispatch board health triage to Ava"
    preconditions:
      - path: "extensions.ava_board_available"
        operator: eq
        value: true
      - path: "domains.ava_board.data.blocked_count"
        operator: gt
        value: 3
    effects: []
    meta:
      topic: "agent.skill.request"
      skillHint: board_health
      agentId: ava
      fireAndForget: true

  - id: alert.ava_backlog_piling
    goalId: ava.backlog_not_piling
    tier: tier_0
    priority: 15
    cost: 0
    name: "Alert when backlog exceeds 10 features"
    preconditions:
      - path: "extensions.ava_board_available"
        operator: eq
        value: true
      - path: "domains.ava_board.data.backlog_count"
        operator: gt
        value: 10
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: action.ava_start_auto_mode
    goalId: ava.backlog_not_piling
    tier: tier_0
    priority: 30
    cost: 1
    name: "Dispatch Ava to start auto-mode when backlog has work"
    preconditions:
      - path: "extensions.ava_board_available"
        operator: eq
        value: true
      - path: "extensions.ava_pipeline_available"
        operator: eq
        value: true
      - path: "domains.ava_pipeline.data.running_count"
        operator: eq
        value: 0
      - path: "domains.ava_board.data.backlog_count"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "agent.skill.request"
      skillHint: auto_mode
      agentId: ava
      fireAndForget: true

  # ── Branch protection ─────────────────────────────────────────────

  - id: alert.branch_bypass_actors
    goalId: branch.main_hardened
    tier: tier_0
    priority: 5
    cost: 0
    name: "Alert on bypass actors in main ruleset"
    preconditions:
      - path: "domains.branch_protection.data.totalBypassActors"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.branch_unprotected
    goalId: branch.main_protected
    tier: tier_0
    priority: 5
    cost: 0
    name: "Alert on repos missing main branch ruleset"
    preconditions:
      - path: "domains.branch_protection.data.unprotectedRepoCount"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  - id: alert.ci_main_red
    goalId: ci.main_last_push_green
    tier: tier_0
    priority: 5
    cost: 0
    name: "Alert when latest push to any repo's main is red"
    preconditions:
      - path: "domains.ci.data.failingMainCount"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true

  # ── Branch drift remediation ──────────────────────────────────────
  #
  # Triggers a GitHub workflow_dispatch of each managed repo's auto
  # back-merge workflows when dev/staging fall too far behind main.
  # The pr-remediator plugin subscribes to this topic and drives the
  # actual GitHub API calls. Idempotent — skipped if a backmerge is
  # already in flight for the same repo.

  - id: action.dispatch_backmerge
    goalId: branch.drift_low
    tier: tier_0
    priority: 10
    cost: 1
    name: "Dispatch auto back-merge workflow when drift exceeds threshold"
    preconditions:
      - path: "domains.branch_drift.data.maxDrift"
        operator: gt
        value: 30
    effects: []
    meta:
      topic: "pr.backmerge.dispatch"
      fireAndForget: true

  # ── HITL routing health ───────────────────────────────────────────
  #
  # This alert bypasses the HITL plugin entirely — if the HITL routing
  # itself is broken (the very thing this goal catches), sending an
  # approval request through the broken path would fail silently too.
  # Direct-to-Discord is the right escape hatch here.

  - id: alert.hitl_routing_broken
    goalId: hitl.no_unrendered_requests
    tier: tier_0
    priority: 5
    cost: 0
    name: "Direct Discord alert when HITL requests fall into hitl.pending (renderer missing)"
    preconditions:
      - path: "domains.hitl_queue.data.unrenderedCount"
        operator: gt
        value: 0
    effects: []
    meta:
      topic: "message.outbound.discord.alert"
      fireAndForget: true
