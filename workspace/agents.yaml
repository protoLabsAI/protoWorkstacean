# A2A Agent Registry — external agents reachable via JSON-RPC 2.0
# SkillBrokerPlugin registers one A2AExecutor per agent.
# URL values support ${ENV_VAR} interpolation.

agents:
  - name: ava
    url: "${AVA_BASE_URL}/a2a"
    apiKeyEnv: AVA_API_KEY
    skills:
      - name: sitrep
        description: Situation report — board state, running agents, escalations
      - name: board_health
        description: Triage blocked features and board health issues
      - name: auto_mode
        description: Start or stop autonomous feature processing
      - name: manage_feature
        description: Manage feature lifecycle (unblock, assign, status change)
      - name: bug_triage
        description: Triage a bug and file it on the board

  - name: protopen
    url: "http://steamdeck:7870/a2a"
    apiKeyEnv: PROTOPEN_API_KEY
    skills:
      - name: passive_recon
        description: "Passive reconnaissance — WiFi/RF/network enumeration, no active probing"
      - name: active_pentest
        description: "Active penetration test — PMKID capture, vuln scanning, RF replay (requires engagement mode)"
      - name: security_report
        description: "Generate security assessment report from engagement findings"
      - name: deep_research
        description: "Research a topic in depth using HuggingFace, GitHub, web, and knowledge store"
      - name: summarize
        description: "Summarize findings from the knowledge store"
