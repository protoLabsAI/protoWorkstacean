# A2A Agent Registry — external agents reachable via JSON-RPC 2.0
# SkillBrokerPlugin registers one A2AExecutor per agent.
# URL values support ${ENV_VAR} interpolation.

agents:
  - name: ava
    url: "${AVA_BASE_URL}/a2a"
    apiKeyEnv: AVA_API_KEY
    skills:
      - name: sitrep
        description: Situation report — board state, running agents, escalations
      - name: board_health
        description: Triage blocked features and board health issues
      - name: auto_mode
        description: Start or stop autonomous feature processing
      - name: manage_feature
        description: Manage feature lifecycle (unblock, assign, status change)
      - name: bug_triage
        description: Triage a bug and file it on the board

  # protoContent — autonomous GTM content engine (Jon + Cindi).
  # Reaches the homelab LiteLLM gateway for all LLM calls; read-only MCP
  # bridge into protoLabs Studio for product context. Skills are still TBD;
  # start with chat so we can dispatch ad-hoc content work before wiring the
  # full Jon/Cindi skill surface in task #72.
  - name: protocontent
    url: "${PROTOCONTENT_BASE_URL}/a2a"
    apiKeyEnv: PROTOCONTENT_A2A_KEY
    skills:
      - name: chat
        description: Open-ended content + GTM dialogue with protoContent (Jon + Cindi)

  # Quinn — standalone QA engineer (labs/quinn nanobot/LangGraph agent).
  # Submits FORMAL GitHub reviews (APPROVE/REQUEST_CHANGES/COMMENT) via the
  # pr_inspector tool, not narrative issue comments — closes the pr-remediator
  # readyToMerge/changesRequested loop for non-safe-class PRs (task #73).
  # Posts as @protoquinn[bot] via installation token minted in her entrypoint
  # from QUINN_APP_ID + QUINN_APP_PRIVATE_KEY, refreshed every 45 min.
  # chat is uncovered here — Discord DMs fall through to ROUTER_DM_DEFAULT_AGENT
  # (currently ava) for free-form conversation.
  - name: quinn
    url: "${QUINN_BASE_URL}/a2a"
    skills:
      - name: pr_review
        description: Review a pull request (CI, CodeRabbit threads, diff) and submit a formal APPROVE/REQUEST_CHANGES/COMMENT review via pr_inspector
      - name: bug_triage
        description: Triage a bug report, classify severity, file it on the Ava board via file_bug
      - name: security_triage
        description: Triage a security incident (CVE, dependabot alert, vulnerability disclosure), classify severity, and file it on the board via report_incident — critical/high escalate to HITL before remediation
