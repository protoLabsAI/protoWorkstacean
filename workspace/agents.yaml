# protoLabs A2A Agent Registry
#
# This file wires the external A2A agent fleet into workstacean:
#   1. SkillBroker — creates one A2AExecutor per entry; skills are
#      auto-discovered from each agent's /.well-known/agent-card.json
#      (refreshed every 10 min). Yaml skills take precedence as overrides.
#   2. DiscordPlugin agent pool — when `discordBotTokenEnvKey` is set,
#      spins up a dedicated Client() per agent so users can DM each bot.
#
# No secrets live here — only env var NAMES. The actual credentials are
# provided by Infisical at container startup (homelab-iac/stacks/ai).
#
# URLs use the docker-ai network service names (e.g. `protomaker-server`),
# which resolve inside the container. For out-of-Docker deployments use
# ${ENV_VAR} interpolation.
#
# Override the entire list via PROTOLABS_AGENTS_JSON env var if a deploy
# needs per-environment wiring without editing this file.

agents:
  # Frank — CI/CD + infrastructure. NOT YET DEPLOYED. Leaving the entry
  # commented out until Frank's agent card + A2A endpoint are live so
  # workstacean doesn't register a dead executor or spam card-discovery
  # 404s every 10 min. Reinstate this block (and DISCORD_BOT_TOKEN_FRANK
  # in homelab-iac) once the container is up.
  #
  # - name: frank
  #   url: http://frank:7880/a2a
  #   auth:
  #     scheme: apiKey
  #     credentialsEnv: FRANK_API_KEY
  #   streaming: true
  #   discordBotTokenEnvKey: DISCORD_BOT_TOKEN_FRANK
  #   subscribesTo:
  #     - message.inbound.discord.#
  #     - message.inbound.github.#

  # protoMaker is NOT an A2A agent. It serves an agent card but no /a2a
  # JSON-RPC endpoint, so every workstacean→protoMaker A2A dispatch failed
  # silently (and a dead bug_triage executor shadowed Quinn's in-process one).
  # Per ADR-0002 the boundary is HTTP + webhooks + bus /publish:
  #   - issue intake: ProtoMakerBoardBridge POSTs /api/engine/signal/submit
  #   - initiative intake: Ava → protoMaker create-project HTTP intake (#3983)
  #   - reads: ProjectRegistry polls /api/settings/global
  #   - reporting up: protoMaker POSTs feature.completed/failed to /publish
  # Do not re-add a protomaker A2A entry here.

  # protopen — security/pentest/RF recon. Remote via Tailscale
  # (PROTOPEN_BASE_URL defaults to http://steamdeck:7870 in homelab-iac).
  # Serves both /.well-known/agent-card.json and the legacy /.well-known/agent.json;
  # advertises streaming:true. Skills: passive_recon, active_pentest,
  # security_report, threat_intel, summarize.
  #
  # Reinstated 2026-05-29 — steamdeck is back online and protopen.service is
  # serving on :7870. (Its Infisical service token had been deleted, crash-looping
  # the unit; re-minted a never-expire read token scoped to ai/prod.) If steamdeck
  # goes offline again, card discovery 404s every 10 min for the whole fleet —
  # comment this block back out until `tailscale status | grep steamdeck` is active.
  - name: protopen
    url: ${PROTOPEN_BASE_URL}/a2a
    auth:
      scheme: apiKey
      credentialsEnv: PROTOPEN_API_KEY
    streaming: true
    external: true
    subscribesTo:
      - message.inbound.discord.#

  # roxy — ProtoMaker Portfolio Manager. Monitors + unblocks the ProtoMaker
  # portfolio (board / features / PRs / CI), takes the smallest unblocking
  # action, reports a sitrep — she does NOT write code. protoAgent A2A fork.
  # The "missing piece" between org-intake (Ava/Linear) and execution.
  #
  # Runs as a docker service on the shared network → reachable as roxy:7870
  # (no Tailscale, so NOT external — unlike protopen).
  #
  # STAGED, not yet live — uncomment once ALL of:
  #   1. roxy is deployed on the shared docker-ai network (roxy:7870 resolves
  #      from this container), and
  #   2. ROXY_API_KEY is provisioned in Infisical (ai/prod), matching roxy's side, and
  #   3. roxy's agent card advertises her operational skill (e.g. project_operations)
  #      + a real description — it's currently the protoAgent template default
  #      (only `chat`), so until then the fleet can only summon her via `chat`,
  #      not route `skill: project_operations` to her (ceremony/event paths).
  # Leaving it commented avoids registering a dead executor + 10-min card-
  # discovery spam for the whole fleet (same policy as frank above).
  #
  # - name: roxy
  #   url: http://roxy:7870/a2a
  #   auth:
  #     scheme: apiKey
  #     credentialsEnv: ROXY_API_KEY
  #   streaming: true
  #   subscribesTo:
  #     - message.inbound.discord.#
  #     - message.inbound.github.#
