# protoLabs A2A Agent Registry
#
# This file wires the external A2A agent fleet into workstacean:
#   1. SkillBroker — creates one A2AExecutor per entry; skills are
#      auto-discovered from each agent's /.well-known/agent-card.json
#      (refreshed every 10 min). Yaml skills take precedence as overrides.
#   2. DiscordPlugin agent pool — when `discordBotTokenEnvKey` is set,
#      spins up a dedicated Client() per agent so users can DM each bot.
#
# No secrets live here — only env var NAMES. The actual credentials are
# provided by Infisical at container startup (homelab-iac/stacks/ai).
#
# URLs use the docker-ai network service names (e.g. `quinn`, `protocontent`),
# which resolve inside the container. For out-of-Docker deployments use
# ${ENV_VAR} interpolation (see protopen at the bottom).
#
# Override the entire list via PROTOLABS_AGENTS_JSON env var if a deploy
# needs per-environment wiring without editing this file.

agents:
  # Frank — CI/CD + infrastructure. NOT YET DEPLOYED. Leaving the entry
  # commented out until Frank's agent card + A2A endpoint are live so
  # workstacean doesn't register a dead executor or spam card-discovery
  # 404s every 10 min. Reinstate this block (and DISCORD_BOT_TOKEN_FRANK
  # in homelab-iac) once the container is up.
  #
  # - name: frank
  #   url: http://frank:7880/a2a
  #   auth:
  #     scheme: apiKey
  #     credentialsEnv: FRANK_API_KEY
  #   streaming: true
  #   discordBotTokenEnvKey: DISCORD_BOT_TOKEN_FRANK
  #   subscribesTo:
  #     - message.inbound.discord.#
  #     - message.inbound.github.#

  # protoMaker — Automaker-server agent (apps/server in protoLabsAI/ava).
  # Hosts the project board, auto-mode runtime, and feature/PR pipeline.
  # Reached on the docker-ai network as automaker-server:3008/a2a; advertises
  # 10 skills (chat, sitrep, manage_feature, auto_mode, board_health,
  # bug_triage, onboard_project, provision_discord, plan, plan_resume).
  # Auth: AVA_API_KEY (the same Ava-app key used for HTTP /api/* — protoMaker
  # validates X-API-Key against its per-app key table).
  #
  # No subscribesTo: protoMaker is reached via explicit GOAP `targets:
  # [protomaker]` dispatches (board_health, auto_mode, bug_triage etc.) — it
  # is not a broadcast inbound listener. Quinn already subscribes to GitHub
  # inbound and triages on protoMaker's behalf via `bug_triage`; adding a
  # second subscriber here would duplicate dispatch with no extra value.
  - name: protomaker
    url: http://automaker-server:3008/a2a
    auth:
      scheme: apiKey
      credentialsEnv: AVA_API_KEY
    streaming: false

  # protopen — security/pentest/RF recon. Remote via Tailscale
  # (PROTOPEN_BASE_URL defaults to http://steamdeck:7870 in homelab-iac).
  # Serves the legacy /.well-known/agent.json path; advertises streaming:true.
  - name: protopen
    url: ${PROTOPEN_BASE_URL}/a2a
    auth:
      scheme: apiKey
      credentialsEnv: PROTOPEN_API_KEY
    streaming: true
    # Runs off-docker on steamdeck via Tailscale — push-notification callback
    # URLs must use WORKSTACEAN_BASE_URL (the operator-configured Tailscale
    # hostname) rather than the docker-internal workstacean:3000.
    external: true
    subscribesTo:
      - message.inbound.discord.#
