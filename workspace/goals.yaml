# World Engine Goals — Global
# Per-project overrides: .automaker/projects/{slug}/goals.yaml

goals:
  - id: flow.efficiency_healthy
    type: Threshold
    severity: medium
    selector: "domains.board.data.efficiency"
    min: 0.35
    description: "Flow efficiency must stay >= 35%"

  - id: flow.distribution_balanced
    type: Distribution
    severity: medium
    description: "Board must have >= 40% features, <= 30% defects"
    distribution:
      feature: 0.40
      defect: 0.30
    tolerance: 0.10

  - id: services.all_healthy
    type: Invariant
    severity: high
    selector: "domains.services.metadata.failed"
    operator: falsy
    description: "No service collection failures"

  - id: agents.all_reachable
    type: Invariant
    severity: high
    selector: "domains.agent_health.data.totalUnreachable"
    operator: falsy
    description: "All A2A agents must be reachable"

  - id: ci.success_rate_healthy
    type: Threshold
    severity: high
    selector: "domains.ci.data.successRate"
    min: 0.70
    description: "CI success rate must stay >= 70%"
