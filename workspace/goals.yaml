# World Engine Goals — Global
# Per-project overrides: .automaker/projects/{slug}/goals.yaml
#
# Paths resolve against WorldState. After HTTP envelope unwrapping:
#   domains.{name}.data.{field}  →  the actual domain payload
#   extensions.{name}_available  →  boolean, set by engine on each tick

goals:
  - id: flow.efficiency_healthy
    type: Threshold
    severity: medium
    selector: "domains.flow.data.efficiency.ratio"
    min: 0.35
    description: "Flow efficiency must stay >= 35%"

  - id: flow.distribution_balanced
    type: Distribution
    severity: medium
    description: "Work mix must have >= 40% features, <= 30% defects"
    selector: "domains.flow.data.distribution.ratios"
    distribution:
      feature: 0.40
      defect: 0.30
    tolerance: 0.10

  - id: services.discord_connected
    type: Invariant
    severity: high
    selector: "domains.services.data.discord.connected"
    operator: truthy
    description: "Discord bot must be connected"

  - id: security.no_open_incidents
    type: Invariant
    severity: critical
    selector: "domains.security.data.openCount"
    operator: falsy
    description: "No open security incidents — all known issues must be resolved"

  - id: agents.registered
    type: Threshold
    severity: high
    selector: "domains.agent_health.data.agentCount"
    min: 1
    description: "At least one agent must be registered"

  # ── CI + PR Pipeline ─────────────────────────────────────────────
  - id: ci.success_rate_healthy
    type: Threshold
    severity: high
    selector: "domains.ci.data.successRate"
    min: 0.70
    description: "CI success rate across all projects must stay >= 70%"

  - id: pr.no_conflicts
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.conflicting"
    max: 0
    description: "No open PRs should have merge conflicts"

  - id: pr.no_stale
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.stale"
    max: 0
    description: "No PRs should be stale (>7 days without activity)"

  - id: pr.no_failing_checks
    type: Threshold
    severity: high
    selector: "domains.pr_pipeline.data.failingCi"
    max: 0
    description: "PRs with failing CI must be remediated — agents dispatched via PrRemediatorPlugin"

  - id: pr.no_changes_requested
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.changesRequested"
    max: 0
    description: "PRs with CHANGES_REQUESTED reviews must be addressed — feedback dispatched via PrRemediatorPlugin"

  - id: pr.mergeable_flushed
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.readyToMerge"
    max: 0
    description: "Ready-to-merge PRs should be flushed — PrRemediatorPlugin auto-merges eligible titles, escalates others to HITL"

  - id: branch.drift_low
    type: Threshold
    severity: medium
    selector: "domains.branch_drift.data.maxDrift"
    max: 30
    description: "No project should have more than 30 commits of branch drift"

  # ── Ava / protoMaker Studio ──────────────────────────────────────
  - id: ava.board_healthy
    type: Threshold
    severity: high
    selector: "domains.ava_board.data.blocked_count"
    max: 3
    description: "No more than 3 features blocked simultaneously"

  - id: ava.backlog_not_piling
    type: Threshold
    severity: medium
    selector: "domains.ava_board.data.backlog_count"
    max: 10
    description: "Backlog should not exceed 10 features — work is piling up"

  # ── Branch protection (catches admin-bypass regressions) ───────
  #
  # PR #3328 landed on protoMaker main with failing Checks because the
  # ruleset allowed admin bypass. These goals would have caught that the
  # moment the ruleset regressed, and caught a red main before any
  # promotion PR inherited the breakage through the merge ref.

  - id: branch.main_hardened
    type: Threshold
    severity: critical
    selector: "domains.branch_protection.data.totalBypassActors"
    max: 0
    description: "No managed repo's main branch ruleset should allow bypass actors"

  - id: branch.main_protected
    type: Threshold
    severity: high
    selector: "domains.branch_protection.data.unprotectedRepoCount"
    max: 0
    description: "Every managed repo must have an active ruleset protecting its default branch"

  - id: ci.main_last_push_green
    type: Threshold
    severity: high
    selector: "domains.ci.data.failingMainCount"
    max: 0
    description: "The latest push to any managed repo's main branch must have passing checks"

  # ── Plane board health ──────────────────────────────────────────
  #
  # These goals watch the rollup surfaced by /api/plane-board. Each
  # managed project that has a planeProjectId contributes to the
  # counters. Selectors target the top-level rollup; per-project
  # detail is available via domains.plane.data.projects[*] for
  # future scope-aware actions.

  - id: plane.no_urgent_stale
    type: Threshold
    severity: critical
    selector: "domains.plane.data.urgentOpen"
    max: 5
    description: "No more than 5 urgent-priority Plane issues should be open at once"

  - id: plane.no_stale_backlog
    type: Threshold
    severity: high
    selector: "domains.plane.data.staleOpen"
    max: 10
    description: "No more than 10 Plane issues should be open longer than 14 days"

  - id: plane.unassigned_not_piling
    type: Threshold
    severity: medium
    selector: "domains.plane.data.unassignedOpen"
    max: 20
    description: "Unassigned Plane issues should not pile up — triage regularly"

  # ── HITL routing health ─────────────────────────────────────────
  - id: hitl.no_unrendered_requests
    type: Threshold
    severity: critical
    selector: "domains.hitl_queue.data.unrenderedCount"
    max: 0
    description: "No HITL request should sit in hitl.pending — if one does, a renderer is missing and notifications are being silently dropped"

  - id: hitl.queue_not_piling
    type: Threshold
    severity: medium
    selector: "domains.hitl_queue.data.pendingCount"
    max: 10
    description: "HITL pending queue should not exceed 10 — escalations are piling up faster than humans can clear them"
