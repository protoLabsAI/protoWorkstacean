# World Engine Goals — Global
# Per-project overrides: .automaker/projects/{slug}/goals.yaml
#
# Paths resolve against WorldState. After HTTP envelope unwrapping:
#   domains.{name}.data.{field}  →  the actual domain payload
#   extensions.{name}_available  →  boolean, set by engine on each tick

goals:
  - id: flow.efficiency_healthy
    type: Threshold
    severity: medium
    selector: "domains.flow.data.efficiency.ratio"
    min: 0.35
    description: "Flow efficiency must stay >= 35%"

  - id: flow.distribution_balanced
    type: Distribution
    severity: medium
    description: "Work mix must have >= 40% features, <= 30% defects"
    selector: "domains.flow.data.distribution.ratios"
    distribution:
      feature: 0.40
      defect: 0.30
    tolerance: 0.10

  - id: services.discord_connected
    type: Invariant
    severity: high
    selector: "domains.services.data.discord.connected"
    operator: truthy
    description: "Discord bot must be connected"

  - id: security.no_open_incidents
    type: Invariant
    severity: critical
    selector: "domains.security.data.openCount"
    operator: falsy
    description: "No open security incidents — all known issues must be resolved"

  - id: agents.registered
    type: Threshold
    severity: high
    selector: "domains.agent_health.data.agentCount"
    min: 1
    description: "At least one agent must be registered"

  # ── CI + PR Pipeline ─────────────────────────────────────────────
  - id: ci.success_rate_healthy
    type: Threshold
    severity: high
    selector: "domains.ci.data.successRate"
    min: 0.70
    description: "CI success rate across all projects must stay >= 70%"

  - id: pr.no_conflicts
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.conflicting"
    max: 0
    description: "No open PRs should have merge conflicts"

  - id: pr.no_stale
    type: Threshold
    severity: medium
    selector: "domains.pr_pipeline.data.stale"
    max: 0
    description: "No PRs should be stale (>7 days without activity)"

  - id: branch.drift_low
    type: Threshold
    severity: medium
    selector: "domains.branch_drift.data.maxDrift"
    max: 30
    description: "No project should have more than 30 commits of branch drift"

  # ── Ava / protoMaker Studio ──────────────────────────────────────
  - id: ava.board_healthy
    type: Threshold
    severity: high
    selector: "domains.ava_board.data.blocked"
    max: 3
    description: "No more than 3 features blocked simultaneously"

  - id: ava.backlog_not_piling
    type: Threshold
    severity: medium
    selector: "domains.ava_board.data.backlog"
    max: 10
    description: "Backlog should not exceed 10 features — work is piling up"
