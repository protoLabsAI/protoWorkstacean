id: daily-standup
name: "Daily Fleet Standup"
description: "Morning ceremony: board summary, active ceremonies, open PRs"
schedule: "0 9 * * 1-5"
# board_audit lives on Quinn (not Ava). Ava advertises chat /
# diagnose_pr_stuck / debug_ci_failures / issue_triage / portfolio_check_in /
# linear_agent_respond. Quinn is the QA agent and the canonical board auditor.
skill: board_audit
targets:
  - quinn
# Routes to the Discord webhook in env DISCORD_WEBHOOK_UPDATES (the slug maps
# to DISCORD_WEBHOOK_<SLUG>). The prior numeric channel id resolved to no
# webhook env var, so the standup digest fell through to console.
notifyChannel: "updates"
enabled: true
