id: health_check
name: "Service Health Check"
description: "Triggered by world engine when a service domain collection fails. Investigates and reports the health status of fleet infrastructure dependencies."
schedule: "0 */6 * * *"
# board_audit was dead (not defined on any agent). Repointed to bug_triage on
# Quinn. The name of this ceremony is misleading: it dispatches a board audit,
# not a service health check. Service-health domain data already comes from
# world-state polling; if a real periodic service health REPORT is wanted, wire
# a new skill on protobot or Quinn.
skill: bug_triage
targets:
  - quinn
notifyChannel: ""
enabled: true
