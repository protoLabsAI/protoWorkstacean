channels:

  - id: testing-conversation
    platform: discord
    channelId: "1491694275992354876"
    agent: quinn
    description: Dedicated test channel — multi-turn conversation smoke test
    conversation:
      enabled: true
      timeoutMs: 300000
      requireMentionAfterFirst: false

  # ── Linear — example channel registrations ─────────────────────────────────
  # Linear channels can be scoped by team key, a specific issue id, or a
  # project id. RouterPlugin matches the inbound message's source.channelId
  # (set by LinearPlugin to teamKey for issues/comments and projectId for
  # project events) against these entries.
  #
  # Uncomment + customize when wiring Linear to an agent.
  #
  # - id: linear-eng-triage
  #   platform: linear
  #   channelId: "ENG"
  #   agent: ava
  #   description: Engineering team — all Linear issues & comments route to Ava
  #   conversation:
  #     enabled: true
  #     timeoutMs: 600000
  #
  # - id: linear-single-ticket
  #   platform: linear
  #   channelId: "ENG-142"
  #   agent: quinn
  #   description: Quinn owns this specific ticket end-to-end

  # ── Google Gmail ───────────────────────────────────────────────────────────
  # GooglePlugin polls labels listed in workspace/google.yaml and publishes
  # message.inbound.google.gmail.{labelSlug}.{threadId}. ChannelRegistry
  # matches the labelSlug segment (lowercase, non-alphanumeric → "-").
  # `channelId` here is the LABEL NAME — not the slug — and the registry
  # normalizes it during indexing.
  - id: google-gmail-inbox
    platform: google
    channelId: "INBOX"
    agent: ava
    description: Every email landing in the user's primary inbox routes to Ava as a chat
    conversation:
      enabled: true
      timeoutMs: 1800000   # 30 min — email replies can take a while
