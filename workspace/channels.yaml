channels:

  - id: testing-conversation
    platform: discord
    channelId: "1491694275992354876"
    agent: ava
    description: Dedicated test channel — multi-turn conversation smoke test
    conversation:
      enabled: true
      timeoutMs: 300000
      requireMentionAfterFirst: false

  # ── Linear ────────────────────────────────────────────────────────────────
  # Linear channels are scoped by team key, a specific issue id, or a
  # project id. RouterPlugin matches the inbound message's source.channelId
  # (set by LinearPlugin to teamKey for issues/comments and projectId for
  # project events) against these entries.
  #
  # Ava is the default Linear handler — she already has the pull-mode tools
  # (linear_list_issues / linear_get_issue / linear_add_comment / etc.) so
  # all team-level traffic routes to her. Agent SDK events (issueMention,
  # issueCommentMention, etc.) flow through this path too; her
  # linear_agent_respond skill (A2 in roadmap 2026-06) branches on the
  # notification action.

  - id: linear-team-josh
    platform: linear
    channelId: "JOSH"
    agent: ava
    description: Josh's Linear team — issues + comments + agent @mentions route to Ava
    conversation:
      enabled: true
      timeoutMs: 600000

  - id: linear-team-matt
    platform: linear
    channelId: "MATT"
    agent: ava
    description: Matt's Linear team — issues + comments + agent @mentions route to Ava
    conversation:
      enabled: true
      timeoutMs: 600000

  # To delegate a specific Linear ticket to a different agent end-to-end,
  # add a channel entry with the team-prefixed issue identifier as channelId:
  #
  # - id: linear-quinn-owned-ticket
  #   platform: linear
  #   channelId: "ENG-142"
  #   agent: quinn
  #   description: Quinn owns this specific ticket end-to-end

  # ── Google Gmail ───────────────────────────────────────────────────────────
  # Gmail is intentionally NOT registered as an inbound-routing channel here.
  # Ava is a pull-mode reader/drafter — she reads / summarizes / drafts
  # replies when explicitly asked, via Gmail tools. She does NOT auto-reply
  # to inbound emails. The `google` platform is supported by the registry
  # (ChannelRegistry.byGoogleGmailLabel + findByTopic) so this entry shape
  # is ready when/if a label-scoped auto-route is desired in the future:
  #
  # - id: google-gmail-INBOX
  #   platform: google
  #   channelId: "INBOX"
  #   agent: ava

  # ── Per-project bindings ──────────────────────────────────────────────────
