name: Auto Release

# Manually-cut releases. Reads the version from package.json on main,
# creates the matching v* tag, and opens a GitHub Release. The tag push
# triggers release.yml which posts release notes to Discord.
#
# Flow: prepare-release.yml bumps the version on main → release.yml is
# triggered manually here → tags main → release.yml (on: tags) posts
# Discord notes.
#
# Releases are decoupled from merges (per workflow change 2026-05-26 retiring
# the dev branch). Feature merges to main deploy via watchtower but don't
# auto-version — version cuts are explicit.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Tag the current main HEAD even if the version is already tagged"
        type: boolean
        default: false

permissions: read-all

jobs:
  release:
    runs-on: namespace-profile-protolabs-linux
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        # zizmor: ignore[artipacked] — credentials are required: this job pushes
        # the release tag with the checked-out token. No artifact upload here, so
        # there is no credential-leak vector to mitigate by dropping them.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: v$VERSION"

          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "already_tagged=true" >> $GITHUB_OUTPUT
            echo "v$VERSION is already tagged."
          else
            echo "already_tagged=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.version.outputs.already_tagged != 'true' || inputs.force == true
        env:
          VERSION_NUM: ${{ steps.version.outputs.version }}
        run: |
          VERSION="v${VERSION_NUM}"
          git tag -a -f "$VERSION" -m "$VERSION"
          git push origin "$VERSION" --force-with-lease

      - name: Create GitHub Release
        if: steps.version.outputs.already_tagged != 'true' || inputs.force == true
        run: |
          VERSION="v${VERSION_NUM}"

          # Skip if release already exists (e.g. after a force-retag)
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub Release $VERSION already exists — skipping create."
            exit 0
          fi

          # Generate notes from auto-notes API; filter chore commits out unless
          # they're the only entries.
          RAW_NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$VERSION" --jq '.body')

          ALL_LINES=$(echo "$RAW_NOTES" | grep '^\* ' || true)
          NON_CHORE=$(echo "$ALL_LINES" | grep -vi '^\* chore' || true)

          if [ -n "$NON_CHORE" ]; then
            FILTERED=$(echo "$RAW_NOTES" | grep -vi '^\* chore')
          else
            FILTERED="$RAW_NOTES"
          fi

          gh release create "$VERSION" --title "$VERSION" --notes "$FILTERED"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NUM: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}

      - name: Summary
        env:
          VERSION_NUM: ${{ steps.version.outputs.version }}
          ALREADY_TAGGED: ${{ steps.version.outputs.already_tagged }}
          FORCE: ${{ inputs.force }}
        run: |
          VERSION="v${VERSION_NUM}"
          if [ "$ALREADY_TAGGED" = "true" ] && [ "$FORCE" != "true" ]; then
            echo "Skipped: $VERSION already tagged."
          else
            echo "Tagged $VERSION. release.yml will post Discord notes from the tag push."
          fi
