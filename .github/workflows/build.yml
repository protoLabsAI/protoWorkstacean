name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type check
        run: bun run tsc --noEmit

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — what shipped
        if: env.DISCORD_DEV_WEBHOOK != ''
        env:
          DISCORD_DEV_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK }}
        run: |
          SUBJECT=$(git log -1 --pretty=format:"%s")
          BODY=$(git log -1 --pretty=format:"%b" | head -5)
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/commit/${{ github.sha }}"

          DESCRIPTION="${SUBJECT}"
          if [ -n "${BODY}" ]; then
            DESCRIPTION="${SUBJECT}\n\n${BODY}"
          fi

          curl -s -X POST "$DISCORD_DEV_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "Shipped to main — ${SHORT_SHA}" \
              --arg desc "${DESCRIPTION}" \
              --arg url "${RUN_URL}" \
              '{embeds:[{title:$title,description:$desc,url:$url,color:5763719,footer:{text:"protoWorkstacean CI"}}]}')"
