name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type check
        run: bun run tsc --noEmit

  dashboard:
    # Dashboard lives in a sub-project with its own tsconfig + build pipeline
    # (Astro islands). The root `test` job does not cover `dashboard/src/` —
    # discovered the hard way on 2026-04-11 when 31 unresolved git merge
    # conflict markers landed on dev through the M3-M6 milestone merges
    # because every PR CI went green while dashboard build would have blown
    # up. See task #82 in the board. Keep this job fast (astro build is ~1s)
    # and independent so the full CI cost is negligible.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Astro requires Node.js >= 22.12 at build time. GHA runners default
      # to Node 20, which `bun run build` inherits when it invokes astro,
      # causing a hard "not supported" failure. Set Node explicitly so the
      # astro build runs against a supported runtime.
      - name: Setup Node (for Astro build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dashboard deps
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard (astro build)
        working-directory: dashboard
        run: bun run build

  build-and-push:
    needs: [test, dashboard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — what shipped
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_PROTOWORKSTACEAN_DEV }}
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
          SHORT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          node -e "
          const webhook = process.env.WEBHOOK;
          if (!webhook) { console.log('No dev webhook configured — skipping'); process.exit(0); }

          const subject = (process.env.COMMIT_SUBJECT ?? '').split('\n')[0];
          const sha     = (process.env.SHORT_SHA ?? '').slice(0, 7);
          const url     = process.env.COMMIT_URL ?? '';

          const resp = await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ embeds: [{ title: \`Shipped — \${sha}\`, description: subject, url, color: 5763719, footer: { text: 'protoWorkstacean' } }] }),
          });
          if (!resp.ok) { console.error('Discord post failed:', resp.status); process.exit(1); }
          console.log('Posted to dev channel.');
          " --input-type=module
