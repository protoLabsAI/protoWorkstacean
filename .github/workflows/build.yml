name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type check
        run: bun run tsc --noEmit

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — what shipped
        run: |
          node - <<'EOF'
          import { readFileSync } from "fs";
          import { parse } from "yaml";

          const projects = parse(readFileSync("workspace/projects.yaml", "utf8")).projects ?? [];
          const project = projects.find(p => p.slug === "protolabsai-protoworkstacean");
          const webhook = project?.discord?.dev?.webhook;
          if (!webhook) { console.log("No dev webhook configured — skipping"); process.exit(0); }

          const subject = process.env.COMMIT_SUBJECT;
          const body    = process.env.COMMIT_BODY;
          const sha     = process.env.SHORT_SHA;
          const url     = process.env.COMMIT_URL;

          const description = body ? `${subject}\n\n${body}` : subject;

          const resp = await fetch(webhook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ embeds: [{ title: `Shipped to main — ${sha}`, description, url, color: 5763719, footer: { text: "protoWorkstacean CI" } }] }),
          });
          if (!resp.ok) console.error(`Discord post failed: ${resp.status}`);
          else console.log("Posted to dev channel.");
          EOF
        env:
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
          COMMIT_BODY:    ${{ github.event.head_commit.message }}
          SHORT_SHA:      ${{ github.sha }}
          COMMIT_URL:     ${{ github.event.head_commit.url }}
