name: Release Notes

# Fires on tag push to post Discord release notes via the
# DISCORD_WEBHOOK_PROTOWORKSTACEAN_RELEASE webhook.
#
# Known gap: tags pushed by auto-release.yml using GITHUB_TOKEN do NOT
# trigger this workflow (GitHub's recursion-prevention policy on
# bot-pushed tags). Until repo GH_PAT is configured (filed: #262),
# use workflow_dispatch to manually post for missed releases.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to post notes for (e.g. v0.7.10). Defaults to latest tag on the workflow's checked-out commit."
        type: string
        required: false

jobs:
  post-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git log
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag pair
        id: tags
        run: |
          # Inputs.tag overrides; otherwise use the tag the workflow ran on.
          TAG="${{ inputs.tag || github.ref_name }}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "Diffing $PREV → $TAG"

      - name: Post release notes to Discord
        uses: protoLabsAI/release-tools@v0.1.0
        with:
          version: ${{ steps.tags.outputs.version }}
          previous-version: ${{ steps.tags.outputs.previous }}
        env:
          GATEWAY_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          # DISCORD_WEBHOOK_URL was the prior canonical name; the action
          # reads DISCORD_RELEASE_WEBHOOK. We map the existing webhook
          # secret across so no secret-renames are needed.
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_PROTOWORKSTACEAN_RELEASE }}
