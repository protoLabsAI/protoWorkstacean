name: Release Notes

# Fires on tag push to post Discord release notes via the org-level
# DISCORD_RELEASE_WEBHOOK secret.
#
# Known gap: tags pushed by auto-release.yml using GITHUB_TOKEN do NOT
# trigger this workflow (GitHub's recursion-prevention policy on
# bot-pushed tags). Until repo GH_PAT is configured (filed: #262),
# use workflow_dispatch to manually post for missed releases.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to post notes for (e.g. v0.7.10). Defaults to latest tag on the workflow's checked-out commit."
        type: string
        required: false

# Read-only: this workflow only reads git history and posts to a Discord webhook.
permissions:
  contents: read

jobs:
  post-release-notes:
    runs-on: namespace-profile-protolabs-linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git log
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Resolve tag pair
        id: tags
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Inputs.tag overrides; otherwise use the tag the workflow ran on.
          TAG="${INPUT_TAG:-$REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "Diffing $PREV → $TAG"

      - name: Post release notes to Discord
        uses: protoLabsAI/release-tools@6ed11005cf2b68dbdf302f0fc2bcf2a13533e42e # v2.1.1
        with:
          version: ${{ steps.tags.outputs.version }}
          previous-version: ${{ steps.tags.outputs.previous }}
        env:
          GATEWAY_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          # Org-level secret — the canonical release webhook shared across the
          # fleet, read by release-tools directly. Same name in every repo.
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
