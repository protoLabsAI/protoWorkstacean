name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    # The reference docs are generated from code at deploy time (bun run docs:gen),
    # so a code change can change the published docs without touching docs/**.
    # Trigger on the generator inputs too — deterministic generators mean a push
    # that doesn't actually change any doc produces an identical build (harmless
    # no-op redeploy; the `pages` concurrency group supersedes overlapping runs).
    paths:
      - 'docs/**'                       # content + VitePress config
      - 'src/**'                        # API routes, bus topics, agent tools, env schema
      - 'lib/**'                        # bus topics, env (process.env reads)
      - 'workspace/agents/**'           # agent tool → agent mapping
      - 'scripts/gen-*.ts'              # the generators
      - 'scripts/audit-bus-topics.ts'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: namespace-profile-protolabs-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Regenerate the auto-generated reference docs from current source so the
      # deployed site is never stale (committed snapshots may lag). Runs at repo
      # root where the generator scripts + their `typescript` devDep resolve.
      - name: Install root dependencies (for docs:gen)
        run: bun install

      - name: Regenerate auto-generated reference docs
        run: bun run docs:gen

      - name: Install dependencies
        working-directory: docs
        run: bun install

      - name: Build static site (VitePress)
        working-directory: docs
        run: bun run build
        env:
          BASE_PATH: /protoWorkstacean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    # workspace-config: allow-hosted-runner GitHub Pages deploy requires the hosted Pages environment
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
