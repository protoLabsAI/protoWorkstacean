name: Back-merge main to dev

# Purpose: prevent ancestry divergence between dev and main caused by squash
# promotions. Every time main receives a squash-merge from a dev→main promotion
# PR, dev loses sight of main's new commit. Without intervention, the NEXT
# promotion PR hits phantom "add/add" conflicts because dev and main have the
# same content but different ancestry. This workflow fixes that by creating a
# PR that merges main's tip into dev with `-X ours` — dev already has the
# correct content, we're only acknowledging the squash commit as an ancestor.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  backmerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Skip if main is already an ancestor of dev
        id: check
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main is already an ancestor of dev — nothing to back-merge"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create backmerge branch and PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/backmerge-main-$(date +%s)"
          git checkout -b "$BRANCH"

          git merge origin/main -X ours --no-ff \
            -m "chore: back-merge main → dev (post ${{ github.sha }})" \
            -m "Acknowledges main's squash commit as an ancestor to prevent phantom conflicts on the next dev→main promotion."

          git push origin "$BRANCH"

          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "chore: back-merge main → dev" \
            --body "Auto-generated by backmerge workflow. Merges main's squash commit into dev ancestry. Content is identical (uses \`-X ours\`), this only fixes merge-base for future promotions."

          gh pr merge --auto --merge
